<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lakota Nexus - Home</title>
<link rel="icon" type="image/svg+xml" href="galaxy-icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="192x192" href="galaxy-icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=VT323&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0420;
    --cyan:#00e5ff;
    --magenta:#ff2bd6;
    --orange:#ff8a2a;
    --ink:#e9e6ff;
    --grid:rgba(0,229,255,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
  body{
    background:
      radial-gradient(900px 600px at 20% 10%, rgba(0,229,255,.25), transparent 60%),
      radial-gradient(900px 600px at 80% 90%, rgba(255,43,214,.22), transparent 60%),
      radial-gradient(700px 500px at 50% 50%, rgba(255,138,42,.18), transparent 65%),
      linear-gradient(180deg,#0a0420,#140736,#0a0420);
  }
  .grid-floor{
    position:fixed; left:0; right:0; bottom:0; height:50vh;
    perspective:600px; pointer-events:none; z-index:0;
    mask-image:linear-gradient(to top, black 20%, transparent 100%);
  }
  .grid-floor::before{
    content:""; position:absolute; inset:0;
    background:
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0/60px 60px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0/60px 60px;
    transform:rotateX(60deg); transform-origin:bottom;
    animation:grid 8s linear infinite;
  }
  @keyframes grid{ from{background-position:0 0,0 0} to{background-position:0 60px,0 0} }

  header.nav{
    position:relative; z-index:5;
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 40px;
    border-bottom:1px solid rgba(0,229,255,.25);
    backdrop-filter: blur(8px);
    background:rgba(10,4,32,.35);
  }
  .brand{
    font-family:'Orbitron',sans-serif; letter-spacing:.22em; font-weight:900;
    font-size:14px; color:var(--cyan); text-shadow:0 0 10px rgba(0,229,255,.7);
  }
  .brand span{color:var(--magenta); text-shadow:0 0 10px rgba(255,43,214,.7);}
  nav.links{display:flex; gap:14px; align-items:center}
  nav.links a{
    font-family:'Orbitron',sans-serif; font-size:12px; letter-spacing:.25em;
    text-decoration:none; color:var(--ink);
    padding:10px 18px;
    border:1px solid rgba(0,229,255,.5);
    background:linear-gradient(180deg, rgba(0,229,255,.08), rgba(255,43,214,.06));
    transition:all .2s ease;
  }
  nav.links a:hover{
    color:#0a0420;
    background:linear-gradient(180deg, var(--cyan), var(--magenta));
    box-shadow:0 0 24px rgba(0,229,255,.6), 0 0 40px rgba(255,43,214,.35);
  }
  nav.links a.active{
    color:var(--orange); border-color:var(--orange);
    text-shadow:0 0 12px rgba(255,138,42,.8);
  }

  main{
    position:relative; z-index:2;
    min-height:calc(100vh - 80px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding:80px 24px;
  }
  .warn{
    font-family:'VT323',monospace; color:var(--orange);
    font-size:26px; letter-spacing:.25em;
    padding:6px 16px; border:1px solid var(--orange);
    text-shadow:0 0 12px rgba(255,138,42,.65);
    margin-bottom:28px;
    animation:flicker 3.4s infinite;
  }
  @keyframes flicker{
    0%,19%,21%,23%,25%,54%,56%,100%{opacity:1}
    20%,24%,55%{opacity:.4}
  }
  h1{
    font-family:'Orbitron',sans-serif; font-weight:900;
    font-size:clamp(36px,6vw,72px); line-height:1;
    margin:0 0 22px;
    background:linear-gradient(90deg, var(--cyan), var(--magenta) 55%, var(--orange));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 18px rgba(255,43,214,.35));
    letter-spacing:.02em;
  }
  h1 .glitch{position:relative; display:inline-block}
  p.msg{
    max-width:680px;
    font-size:20px; color:var(--ink);
    margin:0 auto 40px;
  }
  p.msg em{color:var(--cyan); font-style:normal; text-shadow:0 0 10px rgba(0,229,255,.5)}

  /* Countdown */
  .countdown{
    display:flex; gap:18px; flex-wrap:wrap; justify-content:center;
    margin:0 auto 40px;
  }
  .cbox{
    min-width:110px;
    padding:18px 14px;
    border:1px solid rgba(0,229,255,.5);
    background:linear-gradient(180deg, rgba(0,229,255,.08), rgba(255,43,214,.06));
    box-shadow:0 0 22px rgba(0,229,255,.15) inset;
  }
  .cbox .num{
    font-family:'Orbitron',sans-serif; font-weight:900;
    font-size:clamp(30px,5vw,52px); line-height:1;
    color:var(--cyan);
    text-shadow:0 0 16px rgba(0,229,255,.65);
    font-variant-numeric:tabular-nums;
  }
  .cbox .lbl{
    margin-top:8px;
    font-family:'Orbitron',sans-serif; font-size:11px; letter-spacing:.28em;
    color:var(--magenta); text-shadow:0 0 10px rgba(255,43,214,.6);
  }
  .target-line{
    font-family:'VT323',monospace;
    color:rgba(233,230,255,.65);
    letter-spacing:.1em;
    font-size:18px;
    margin:0 0 46px;
  }
  .target-line em{color:var(--orange); font-style:normal; text-shadow:0 0 10px rgba(255,138,42,.5)}

  .cta{
    display:inline-block;
    font-family:'Orbitron',sans-serif; font-weight:700;
    letter-spacing:.28em; font-size:13px;
    text-decoration:none; color:#0a0420;
    padding:14px 26px;
    background:linear-gradient(90deg, var(--cyan), var(--magenta));
    box-shadow:0 0 22px rgba(0,229,255,.5), 0 0 40px rgba(255,43,214,.35);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .cta:hover{
    transform:translateY(-2px);
    box-shadow:0 0 32px rgba(0,229,255,.75), 0 0 60px rgba(255,43,214,.5);
  }
  .barcode{
    margin-top:60px;
    font-family:'VT323',monospace;
    color:rgba(233,230,255,.55);
    letter-spacing:.15em;
    font-size:16px;
  }
</style>
</head>
<body>
  <div class="grid-floor" aria-hidden="true"></div>

  <header class="nav">
    <div class="brand">Lakota<span></span>NEXUS</div>
    <nav class="links">
      <a href="https://lakotanexus.com" class="active" data-testid="nav-home">HOME</a>
      <a href="https://about.lakotanexus.com" data-testid="nav-about">ABOUT</a>
    </nav>
  </header>

  <main>
    <div class="warn">// SIGNAL_INCOMING</div>
    <h1><span class="glitch">We launch soon.</span></h1>
    <p class="msg">The site is powering up. <em>Countdown to launch</em> is below.</p>

    <div class="countdown" id="countdown" aria-live="polite">
      <div class="cbox"><div class="num" id="cd-days">00</div><div class="lbl">DAYS</div></div>
      <div class="cbox"><div class="num" id="cd-hours">00</div><div class="lbl">HRS</div></div>
      <div class="cbox"><div class="num" id="cd-mins">00</div><div class="lbl">MIN</div></div>
      <div class="cbox"><div class="num" id="cd-secs">00</div><div class="lbl">SEC</div></div>
    </div>
    <p class="target-line">TARGET: <em>Saturday, August 1, 2026 — 2:00 PM MST</em></p>

    <a href="https://about.lakotanexus.com" class="cta" data-testid="cta-about">VISIT THE ABOUT PAGE →</a>
    <div class="barcode">||| ||  ||||  |  ||| ||||  ||  ||| |  ||||  ||  |||</div>
  </main>

  <script>
    // MST is a fixed UTC-7 offset (Arizona-style, no daylight saving)
    var targetDate = new Date("2026-08-01T14:00:00-07:00");

    function pad(n){ return String(n).padStart(2,'0'); }

    function updateCountdown(){
      var now = new Date();
      var diff = targetDate - now;
      var daysEl = document.getElementById('cd-days');
      var hoursEl = document.getElementById('cd-hours');
      var minsEl = document.getElementById('cd-mins');
      var secsEl = document.getElementById('cd-secs');

      if (diff <= 0){
        daysEl.textContent = '00';
        hoursEl.textContent = '00';
        minsEl.textContent = '00';
        secsEl.textContent = '00';
        document.querySelector('.warn').textContent = '// LIVE_NOW';
        document.querySelector('h1 .glitch').textContent = "We're live!";
        return;
      }

      var totalSeconds = Math.floor(diff / 1000);
      var days = Math.floor(totalSeconds / 86400);
      var hours = Math.floor((totalSeconds % 86400) / 3600);
      var mins = Math.floor((totalSeconds % 3600) / 60);
      var secs = totalSeconds % 60;

      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minsEl.textContent = pad(mins);
      secsEl.textContent = pad(secs);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>
